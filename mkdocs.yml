site_name: filetype-detector Documentation
site_description: A Python library for detecting file types using multiple inference strategies
site_author: devcomfort
site_url: https://filetype-detector.readthedocs.io/

repo_name: filetype-detector
repo_url: https://github.com/devcomfort/filetype-detector
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: en

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Tutorial:
    - Getting Started: getting-started.md
  - How-to Guides:
    - Overview: how-to/index.md
    - Choose an Inferencer: how-to/choose-an-inferencer.md
    - Process Files in Bulk: how-to/process-files-in-bulk.md
    - Extend with a Custom Inferencer: how-to/extend-with-custom-inferencer.md
    - Examples and Patterns: user-guide.md
  - Reference:
    - Overview: reference/index.md
    - BaseInferencer: api/base_inferencer.md
    - AutoInferencer: api/auto_inferencer.md
    - LexicalInferencer: api/lexical_inferencer.md
    - MagicInferencer: api/magic_inferencer.md
    - MagikaInferencer: api/magika_inferencer.md
    - HybridInferencer: api/hybrid_inferencer.md
    - FAQ and Troubleshooting: faq.md
  - Explanation:
    - Overview: explanation/index.md
    - Inference Strategies: explanation/inference-strategies.md
    - Architecture: architecture.md
  - Project:
    - Contributing: contributing.md
